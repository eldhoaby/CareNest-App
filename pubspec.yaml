name: aal_app
description: SafeNest - Ambient Assisted Living App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.18.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.1
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Networking
  http: ^1.2.0

  # Storage
  shared_preferences: ^2.3.0

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  google_fonts: ^8.0.2
  provider: ^6.1.5+1

  # Profile Photo (Feature #7)
  firebase_storage: ^12.3.7
  image_picker: ^1.1.2
  audioplayers: ^6.6.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/safenest_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/safenest_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/