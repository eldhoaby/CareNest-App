name: Markdown Lint

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
        
      - name: Run markdownlint
        run: markdownlint "**/*.md" --ignore "node_modules"
